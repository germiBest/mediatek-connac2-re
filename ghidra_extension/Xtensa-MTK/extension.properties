name=Xtensa-MTK
description=Processor extension for the MediaTek connac2 Wi-Fi-MCU (MT7961/MT7921/MT7915-family) Tensilica Xtensa LX core with vendor custom-TIE. Adds the language "Xtensa:LE:32:MTK" so connac2 WM/neptune firmware blobs decode with length-correct, never-fail opaque constructors for the otherwise-undecodable MediaTek custom TIE opcodes. Coexists with stock Ghidra Xtensa.
author=connac2 firmware-RE project
createdOn=2026-06-27
version=12.1
